<!doctype html>
<!-- A deliberately NON-compliant sample, so the demo gate has something to catch.
     It breaks Meridian's spec three ways: pure-black ground (#000000, a retired
     value), an off-palette red, and the accent used as a giant fill instead of a
     scarce pointer. Run `npm run demo` and watch the gate FAIL this on purpose. -->
<body style="background:#000000; color:#3a6ea5">
  <h1 style="color:#3a6ea5">Everything is the accent now</h1>
  <p style="color:#3a6ea5">And the background is pure black.</p>
  <a href="#" style="color:#3a6ea5">link</a>
  <button style="background:#ff0000; color:#fff">off-palette red</button>
</body>
